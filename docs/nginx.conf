# ═══════════════════════════════════════════════════════════
# Nginx Configuration for CSC Seva Kendra
# File: /etc/nginx/sites-available/csc-seva-kendra.conf
#
# Features:
#  - HTTPS with Let's Encrypt / Cloudflare SSL
#  - HTTP → HTTPS redirect
#  - Security headers (CSP, HSTS, etc.)
#  - Reverse proxy to Node.js (port 3000)
#  - Rate limiting
#  - Gzip compression
#  - Static file caching
#  - Hide Nginx version
#  - Block common attack patterns
# ═══════════════════════════════════════════════════════════

# Hide Nginx version globally (also set in nginx.conf)
server_tokens off;

# ── Rate limiting zones ──
limit_req_zone  $binary_remote_addr  zone=api:10m    rate=10r/m;
limit_req_zone  $binary_remote_addr  zone=login:10m  rate=5r/m;
limit_req_zone  $binary_remote_addr  zone=general:10m rate=60r/m;
limit_conn_zone $binary_remote_addr  zone=perip:10m;

# ── Map to block bad bots / scanners ──
map $http_user_agent $bad_bot {
  default           0;
  "~*masscan"       1;
  "~*zgrab"         1;
  "~*sqlmap"        1;
  "~*nikto"         1;
  "~*nmap"          1;
  ""                1;     # Empty UA
}

# ════════════════════════════════════════════
# HTTP → HTTPS redirect
# ════════════════════════════════════════════
server {
  listen 80;
  listen [::]:80;
  server_name yourdomain.in www.yourdomain.in;

  # Allow Let's Encrypt ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ════════════════════════════════════════════
# HTTPS Main Server
# ════════════════════════════════════════════
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name yourdomain.in www.yourdomain.in;

  # ── SSL Certificates (Let's Encrypt) ──
  ssl_certificate     /etc/letsencrypt/live/yourdomain.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.in/privkey.pem;

  # ── Modern SSL config (Mozilla Intermediate) ──
  ssl_protocols             TLSv1.2 TLSv1.3;
  ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
  ssl_prefer_server_ciphers off;
  ssl_session_cache         shared:SSL:10m;
  ssl_session_timeout       1d;
  ssl_session_tickets       off;
  ssl_stapling              on;
  ssl_stapling_verify       on;
  resolver                  8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout          5s;

  # ── Root and limits ──
  root       /var/www/csc-website/frontend;
  index      index.html;
  client_max_body_size 3m;
  limit_conn perip 20;

  # ── Block bad bots ──
  if ($bad_bot) {
    return 444;    # Close connection without response
  }

  # ── Block common attack patterns ──
  location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
    return 403;
  }
  location ~ /\. {
    deny all;         # Block dotfiles (.env, .git, etc.)
    access_log off;
  }
  location ~* /(wp-admin|wp-login|phpMyAdmin|phpmyadmin|admin\.php) {
    return 444;
  }

  # ── Security Headers ──
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options            "DENY"                                          always;
  add_header X-Content-Type-Options     "nosniff"                                       always;
  add_header X-XSS-Protection           "1; mode=block"                                 always;
  add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
  add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;
  add_header Content-Security-Policy    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob: maps.googleapis.com; frame-src maps.google.com; connect-src 'self'; object-src 'none';" always;

  # ── Gzip ──
  gzip            on;
  gzip_vary       on;
  gzip_proxied    any;
  gzip_comp_level 6;
  gzip_types      text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # ── Static Files (long cache) ──
  location ~* \.(css|js|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|webp|gif)$ {
    expires    30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Uploads — images only, read-only ──
  location /uploads/ {
    alias  /var/www/csc-website/uploads/;
    expires 7d;
    add_header Cache-Control "public";
    # Only serve images
    location ~* \.(webp|jpg|jpeg|png)$ { }
    location / { return 403; }
  }

  # ── API — proxy to Node.js ──
  location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # Don't expose Node headers
    proxy_hide_header  X-Powered-By;
  }

  # ── Auth endpoint — extra strict rate limiting ──
  location /api/admin/login {
    limit_req zone=login burst=5 nodelay;
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # ── Admin Panel — extra headers ──
  location = /admin.html {
    add_header Cache-Control  "no-store, no-cache" always;
    add_header X-Robots-Tag   "noindex, nofollow"  always;
    # Optionally restrict by IP:
    # allow 103.x.x.x;    # Your IP
    # deny all;
    try_files $uri =404;
  }

  # ── SPA Fallback ──
  location / {
    limit_req zone=general burst=30 nodelay;
    try_files $uri $uri/ /index.html;
  }

  # ── Logs ──
  access_log /var/log/nginx/csc-access.log combined;
  error_log  /var/log/nginx/csc-error.log  warn;
}
